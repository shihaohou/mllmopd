# Level-1 audit subset specification — FULL version.
# Most benchmarks below are not on the dev box yet (see docs/server-inventory.md).
# For a today-runnable subset, use audit_v0_smoke.yaml instead.

name: audit_v0
total_size: 2000
seed: 20260514

# Weights are normalized; sizes are computed as round(total * weight).
benchmarks:
  MathVista:      { weight: 0.20 }
  MathVision:     { weight: 0.15 }
  MathVerse:      { weight: 0.10 }
  LogicVista:     { weight: 0.10 }
  ChartQA:        { weight: 0.15 }
  HallusionBench: { weight: 0.15 }
  CharXiv:        { weight: 0.10 }
  MMMU:           { weight: 0.05 }

# Passes to run on this subset. Each entry produces one JSONL output.
passes:
  - { tag: T_RL_full,        model: MMR1/MMR1-7B-RL,  mode: full_image      }
  - { tag: T_SFT_full,       model: MMR1/MMR1-7B-SFT, mode: full_image      }
  - { tag: S_full,           model: MMR1/MMR1-3B-SFT, mode: full_image      }
  - { tag: T_RL_blank,       model: MMR1/MMR1-7B-RL,  mode: blank_image     }
  - { tag: S_blank,          model: MMR1/MMR1-3B-SFT, mode: blank_image     }
  - { tag: S_oracle_caption, model: MMR1/MMR1-3B-SFT, mode: oracle_caption  }
