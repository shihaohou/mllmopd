# T1-2 — FullTeacher OPD arm (vanilla OPD, teacher sees the real image)
#
# This file is *project-level metadata*: documents the arm for tracking and
# reproducibility (paper figures, run registry, future-reader sanity checks).
# It is NOT consumed by the trainer. Uni-OPD's `ray_launcher.py train.py`
# reads CLI flags directly; values below are the defaults baked into
# `scripts/train/opd_mmr1_3b_baseline.sh` (the launcher) and `start_teacher_server.sh`.
#
# If anything below disagrees with the launcher, the launcher wins — but
# please open an issue and reconcile rather than silently letting the two
# drift.
#
# See also:
#   - docs/t1-plan-2026-05-19.md         (sections §0, §2, §6, §7, §8)
#   - docs/finding-2026-05-19-vision-conditioned.md
#   - configs/baseline/mmr1_3b_t1_3_blank_teacher.yaml  (the paired BlankTeacher arm)

# ----------------------------------------------------------------------------
# Identity
# ----------------------------------------------------------------------------
arm: "T1-2"
arm_tag: "FullTeacher OPD (vanilla baseline)"
description: >
  Vanilla on-policy distillation from MMR1-7B-RL → MMR1-3B-SFT where the
  teacher scores the student's rollout while conditioning on the *full,
  unmodified* image (`OPD_TEACHER_IMAGE_MODE=full`). This is the standard
  vanilla-OPD recipe and the *positive* arm of the T1 negative-control
  experiment. It tests whether vanilla OPD's dense token-level KL transfers
  the teacher's vision-conditioned capability when the visual signal is
  actually present in the teacher's reward.

decision_role: >
  Positive term in the headline metric
  Δ = (T1-2 − T1-0) − (T1-3 − T1-0). T1-2 minus T1-0 measures the *total*
  improvement from vanilla OPD; subtracting the BlankTeacher term (T1-3)
  isolates the portion of that improvement that depends on the teacher
  actually seeing the image. A large Δ (T1-2 ≫ T1-3) supports the
  vision-conditioned-transfer claim; Δ ≈ 0 means vanilla OPD is mostly
  language-prior distillation. See docs/t1-plan-2026-05-19.md §0.

# ----------------------------------------------------------------------------
# T1 arm selector — the ONLY knob that differs between T1-2 and T1-3
# ----------------------------------------------------------------------------
opd_teacher_image_mode: "full"           # env var OPD_TEACHER_IMAGE_MODE
# Note: dual_teacher_get_reward.get_reward unconditionally scores both arms
# (full and blank) and stores both into diagnostics; OPD_TEACHER_IMAGE_MODE
# only selects which side is the *primary* training reward. So we get
# lp_full + lp_blank on every row regardless of arm (plan §2.4). For THIS
# arm lp_full is the training reward; lp_blank is the diagnostic counterpart.

# ----------------------------------------------------------------------------
# Models
# ----------------------------------------------------------------------------
teacher:
  model_name: "MMR1-7B-RL"
  hf_path_env: "MMR1_7B_RL_CKPT"         # resolved from .env at runtime
  why_this_teacher: >
    Memory project_teacher_student.md: MMR1-7B-RL is the smallest open RL
    multimodal model whose published MathVista (0.720) we reproduce *exactly*
    on level1_v4_sysprompt_fixed. Rules out eval-bug confounders. Calibrated
    against MMR1 paper Table 2 (docs/finding-2026-05-19-vision-conditioned.md
    §Setup and calibration).

student:
  model_name: "MMR1-3B-SFT"
  hf_path_env: "MMR1_3B_SFT_CKPT"        # resolved from .env at runtime
  why_this_student: >
    Same family as teacher (shared chat template, sysprompt-before-image
    convention) — neutralizes prompt-format confounds when comparing
    T1-2 vs T1-3. MMR1-3B-SFT is the post-SFT pre-RL checkpoint; the
    teacher's measured advantage over it on the 133 opd_target prompts
    is by construction vision-critical.

# ----------------------------------------------------------------------------
# Training data
# ----------------------------------------------------------------------------
training_data:
  source: "MMR1-RL"                       # ${MMR1_RL_DATA}, ~15k QA pairs
  path: "data/opd_train/v0_2k/train.jsonl"  # prep output, repo-relative
  size: 2000                              # T1-v0 budget; plan §3
  dedup_layers_passed:
    # See scripts/data/prep_opd_train_data.py and the emitted
    # `data/opd_train/v0_2k/dedup_report.json`. Layers refer to plan §2.5.
    - "layer_b_normalized_question"      # lowercased, ws-collapsed, punct-stripped
    - "layer_d_image_hash"                # SHA-256 over RGB pixels
    # Layers a (exact id), c (question+choices), e (fuzzy MinHash) are
    # documented intent but not yet emitted in dedup_report.json; layer-b
    # subsumes most of (a) and (c) in practice. Verify
    # dedup_report.json:hard_stop_triggered == false before launch.
  opd_target_excluded: true               # the 133 dev-set ids stay out (finding §T1)

# ----------------------------------------------------------------------------
# Eval data (T1 eval grid — reused audit infra)
# ----------------------------------------------------------------------------
eval_data:
  source: "level1_v4_sysprompt_fixed"     # the G1 post-fix canonical audit
  path: "data/audit/level1_subset_v0.jsonl"  # 1200 prompts, 6 benchmarks × 200 ea.
  opd_target_ids_path: "runs/audit/level1_v4_sysprompt_fixed/opd_target_ids.json"
  opd_target_size: 133                    # vision-critical subset (finding §F1)
  benchmarks: ["MathVista", "MathVision", "MathVerse",
               "ChartQA", "HallusionBench", "POPE_adversarial"]
  modes: ["full_image", "blank_image", "text_only"]  # 4-mode grid w/ baseline

# ----------------------------------------------------------------------------
# Hyperparameters — VERBATIM from scripts/train/opd_mmr1_3b_baseline.sh
# ----------------------------------------------------------------------------
hyperparams:
  # Optimizer (OPTIMIZER_ARGS in launcher)
  lr: 1.0e-6
  lr_warmup: 5                            # iters, constant decay
  optimizer: "adam"
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.98

  # OPD / PPO-style clipping (GRPO_ARGS in launcher)
  eps_clip: 0.2
  eps_clip_high: 0.28                     # asymmetric clip upper bound
  opd_clip_range: 10.0                    # --teacher-student-logprob-clip-range
  advantage_estimator: "on_policy_distillation"  # the vanilla OPD loss path
  kl_loss_coef: 0.00                      # KL ref unused; flag still passed
  kl_loss_type: "low_var_kl"
  entropy_coef: 0.00

  # Rollout / batching (ROLLOUT_ARGS)
  rollout_batch_size: 8                   # prompts per rollout
  sample_n: 8                             # n_samples_per_prompt
  global_batch_size: 64                   # = rollout_batch_size * sample_n
  num_epoch: 1                            # locked to 1 in T1-v0 (plan §3)
  rollout_max_prompt_len: 4096
  rollout_max_response_len: 4096          # 2026-05-27 atlas-era bump: new topology has rollout/trainer on different GPUs of same H800, MBS=1 → per-forward memory dominated by max_len not DP. v1 step_148 OOM @ 2048 was on different topology; 80GB H800 has headroom for 4096 (estimated peak ~50GB). Trade-off: ~2.5-3x wall-clock vs v1 due to DP=4 + max_len 2x.
  rollout_temperature: 1

  # Checkpointing
  save_interval: 20                       # ~13 ckpts over 230 steps — Rethinking-style training-dynamics resolution

# ----------------------------------------------------------------------------
# Uni-OPD features intentionally DISABLED (vanilla baseline; plan §4)
# ----------------------------------------------------------------------------
disabled_features:
  - name: "margin_shift"
    why: "Uni-OPD improvement over vanilla; T1 measures vanilla baseline only."
  - name: "margin_mask_greedy"
    why: "Uni-OPD improvement; vanilla OPD treats every token uniformly."
  - name: "enable_filter"
    why: "Sample-filter is a Uni-OPD addition; keeps reward uniform-over-tokens."
  - name: "adv_shift"
    why: "Advantage-shift is a Uni-OPD addition; not part of vanilla OPD."

# ----------------------------------------------------------------------------
# Parallelism (8 × H800-140GB devbox; teacher binds GPU 0, trainer gets 1-4,
# GPUs 5-7 idle. DP=4 / TP=1 / GBS=64 is what the H800 smoke validated; see
# launcher comment near ACTOR_NUM_GPUS_PER_NODE for the GBS divisibility
# rationale before changing.)
# ----------------------------------------------------------------------------
parallelism:
  actor_num_nodes: 1
  actor_num_gpus_per_node: 4              # student trainer (1..4)
  rollout_num_gpus: 4                     # colocated sglang rollout
  trainer_gpus: "1,2,3,4"                 # CUDA_VISIBLE_DEVICES
  teacher_gpus: "0"                       # standalone sglang server, GPU 0
  tp_size: 1                              # 3B fits on one GPU

# ----------------------------------------------------------------------------
# Wall-time budget (plan §6)
# ----------------------------------------------------------------------------
wall_time_budget_hours: 5                 # ~4-5h/arm at 2k × 1 epoch × 250 steps

# ----------------------------------------------------------------------------
# Outputs (all under ${MLLMOPD_RUNS}/${OPD_RUN_NAME})
# ----------------------------------------------------------------------------
outputs:
  experiment_dir_env: "${MLLMOPD_RUNS}/t1_v0_T1_2_full"
  checkpoints_dir: "${MLLMOPD_RUNS}/t1_v0_T1_2_full/ckpt"
  tensorboard_dir: "${MLLMOPD_RUNS}/t1_v0_T1_2_full/tensorboard"
  diagnostics_dir: "${MLLMOPD_RUNS}/t1_v0_T1_2_full/diagnostics"  # opd_diagnostics_hook.py
  log_dir: "${MLLMOPD_RUNS}/t1_v0_T1_2_full/logs"
  save_hf: "${MLLMOPD_RUNS}/t1_v0_T1_2_full/ckpt/hf/step_{rollout_id}"

# ----------------------------------------------------------------------------
# Success metric (plan §0, finding §T1)
# ----------------------------------------------------------------------------
success_metric:
  headline: "Δ = (T1-2 − T1-0) − (T1-3 − T1-0)"  # per-benchmark + averaged
  per_benchmark_metrics:
    G_full: "Acc_T1^full − Acc_SFT^full"
    G_gap:  "(full − blank)_T1 − (full − blank)_SFT"
    blank_leakage_ratio: "G_blank / max(eps, G_full)"
    opd_target_recovery: "fraction of 133 opd_target prompts T1 gets right"
    purev_recovery: "fraction of 98 PureV subset T1 gets right"
  ci_method: "bootstrap 1000 resamples, 95% CI; McNemar paired on opd_target"

# ----------------------------------------------------------------------------
# Risk references (plan §7; same set for both arms)
# ----------------------------------------------------------------------------
risk_references:
  - "R1: MMR1-RL ↔ eval contamination — dedup_report.json layer-b must be <5%."
  - "R2: sysprompt-before-image parity — punch list #3 chat-template verify."
  - "R3: sglang rollout OOM — rollout_max_response_len=2048 v0 guard."
  - "R4: teacher KL exploding — opd_clip_range=10 mitigates; watch pg_loss_zeros."
  - "R5: output-format drift — track mcq_high_conf_rate during T1-eval."
  - "R6: image-encode latency stalls teacher — pre-encode + cache; blank dedup."
  - "R7: cuDNN race — unset LD_LIBRARY_PATH; cuDNN ≥ 9.16 in train venv."
  - "R8: teacher-scoring prompt mismatch — 3-sample byte-level diff at smoke (#9)."
  - "R9: n=133 opd_target / n=200/bench noise — bootstrap CI + McNemar."

# ----------------------------------------------------------------------------
# Arm-specific notes
# ----------------------------------------------------------------------------
notes: >
  T1-2 *actual reward* is teacher logp under the FULL image (lp_full). Per
  plan §2.4, the launcher also dual-logs lp_blank as a diagnostic so we can
  attribute training-time visual dependency post-hoc. The
  OPD_TEACHER_IMAGE_MODE env var is set to "full" only when used as the
  reward-defining mode; the underlying dual_teacher_get_reward hook still
  emits both quantities to diagnostics. T1-2 is the *positive* arm — if it
  underperforms T1-3, OPD is anti-correlated with the visual signal and
  the framing is dead; if T1-2 ≫ T1-3, the vision-conditioned-transfer
  hypothesis survives and T2 (VD-aware OPD) is justified.
